<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano - Herramientas y Modo Oscuro</title>
    <style>
        /* ==========================================
           VARIABLES DE TEMA (CLARO POR DEFECTO)
           ========================================== */
        :root {
            --bg-body: #e0e0e0;
            --bg-svg: #ffffff;
            --line-color: #000000;
            --text-main: #000000;
            --text-sub: #333333;
            --accent-color: #cc0000;
            --panel-bg: #ffffff;
            --panel-border: #cccccc;
        }

        /* VARIABLES MODO OSCURO */
        body.dark-mode {
            --bg-body: #121212;
            --bg-svg: #1e1e1e;
            --line-color: #ffffff;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent-color: #ff5252;
            --panel-bg: #2d2d2d;
            --panel-border: #444444;
        }

        /* ==========================================
           ESTILOS GENERALES
           ========================================== */
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-body);
            font-family: sans-serif;
            transition: background-color 0.3s ease;
        }

        .plano-container {
            width: 100%;
            max-width: 1485px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background-color: var(--bg-svg);
            transition: background-color 0.3s ease;
            margin-top: 60px; /* Espacio para que el panel no tape el plano al hacer scroll */
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ==========================================
           ESTILOS DE INTERFAZ DE USUARIO (UI)
           ========================================== */
        .ui-panel {
            position: fixed;
            top: 20px;
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
            color: var(--text-main);
            display: flex;
            gap: 10px;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        button {
            cursor: pointer;
            padding: 8px 12px;
            border: 1px solid var(--panel-border);
            border-radius: 5px;
            background-color: transparent;
            color: var(--text-main);
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button:hover {
            background-color: var(--line-color);
            color: var(--bg-svg);
        }

        /* Panel Superior Izquierdo (Impresión y Tema) */
        #top-left-panel { left: 20px; }

        /* Panel Superior Derecho (Capas) */
        #top-right-panel { right: 20px; flex-direction: column; align-items: flex-end; }
        
        #layer-menu {
            display: none; /* Oculto por defecto */
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            text-align: left;
            width: 100%;
        }

        #layer-menu.active {
            display: flex;
        }

        #layer-menu label {
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ==========================================
           ESTILOS PARA IMPRESIÓN (Limpia la UI)
           ========================================== */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            .ui-panel {
                display: none !important; /* Oculta los botones al imprimir */
            }
            .plano-container {
                box-shadow: none;
                margin: 0;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="top-left-panel" class="ui-panel">
        <button onclick="window.print()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
            Juan - Impresión
        </button>
        <button id="theme-toggle" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Modo Oscuro
        </button>
    </div>

    <div id="top-right-panel" class="ui-panel">
        <button onclick="toggleLayers()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 12 12 17 22 12"></polyline><polyline points="2 17 12 22 22 17"></polyline></svg>
            Capas
        </button>
        <div id="layer-menu">
            <label><input type="checkbox" checked onchange="toggleLayer('layer-perimeter', this)"> Perímetro Exterior</label>
            <label><input type="checkbox" checked onchange="toggleLayer('layer-labels', this)"> Letras (A, B, C, D)</label>
            <label><input type="checkbox" checked onchange="toggleLayer('layer-titleblock', this)"> Cajetín de Título</label>
        </div>
    </div>

    <div class="plano-container">
        <svg viewBox="0 0 2970 2100" xmlns="http://www.w3.org/2000/svg">
          <style>
            /* Las clases ahora responden a las variables CSS de arriba */
            .bg { fill: var(--bg-svg); transition: fill 0.3s; }
            .room { fill: var(--bg-svg); transition: fill 0.3s; }
            .wall-ext { fill: none; stroke: var(--line-color); stroke-width: 8; stroke-linecap: square; stroke-linejoin: miter; transition: stroke 0.3s; }
            .side-label { fill: var(--accent-color); font-family: sans-serif; font-size: 56px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; transition: fill 0.3s; }
            .title-block { fill: var(--bg-svg); stroke: var(--line-color); stroke-width: 4; transition: all 0.3s; }
            .title-text-main { fill: var(--text-main); font-family: sans-serif; font-size: 36px; font-weight: bold; text-anchor: middle; letter-spacing: 4px; transition: fill 0.3s; }
            .title-text-sub { fill: var(--text-sub); font-family: sans-serif; font-size: 20px; text-anchor: middle; letter-spacing: 2px; transition: fill 0.3s; }
          </style>
        
          <rect width="100%" height="100%" class="bg" />
        
          <g transform="translate(735, 675)">
            <g id="layer-perimeter" transform="translate(1500, 0) rotate(90)">
              <rect x="0" y="0" width="750" height="1500" class="room" />
              <rect x="0" y="0" width="750" height="1500" class="wall-ext" />
            </g>

            <g id="layer-labels">
              <text x="750" y="-60" class="side-label">A</text>
              <text x="1560" y="375" class="side-label">B</text>
              <text x="750" y="810" class="side-label">C</text>
              <text x="-60" y="375" class="side-label">D</text>
            </g>
          </g>
        
          <g id="layer-titleblock" transform="translate(100, 1920)">
            <rect x="0" y="0" width="2770" height="120" class="title-block" />
            <text x="1385" y="55" class="title-text-main">PERÍMETRO ARQUITECTÓNICO</text>
            <text x="1385" y="95" class="title-text-sub">PLANTA GENERAL • ESCALA 1:100 • FORMATO A4</text>
          </g>
        </svg>
    </div>

    <script>
        // Función para cambiar de Modo Claro a Modo Oscuro
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                themeIcon.textContent = '☀️';
                document.getElementById('theme-toggle').innerHTML = '<span id="theme-icon">☀️</span> Modo Claro';
            } else {
                themeIcon.textContent = '🌙';
                document.getElementById('theme-toggle').innerHTML = '<span id="theme-icon">🌙</span> Modo Oscuro';
            }
        }

        // Función para abrir/cerrar el menú desplegable de Capas
        function toggleLayers() {
            const menu = document.getElementById('layer-menu');
            menu.classList.toggle('active');
        }

        // Función para Ocultar/Mostrar elementos SVG individuales
        function toggleLayer(layerId, checkbox) {
            const layer = document.getElementById(layerId);
            if (checkbox.checked) {
                layer.style.display = 'block';
            } else {
                layer.style.display = 'none';
            }
        }
    </script>
</body>
</html>
