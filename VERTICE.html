<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Distribución Arquitectónica - Rotado</title>
    <style>
        /* Estilos generales de la página para presentar el plano */
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e0e0e0;
            font-family: sans-serif;
        }

        /* Contenedor que simula la hoja física */
        .plano-container {
            width: 100%;
            max-width: 1485px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background-color: #ffffff;
        }

        /* Asegurar que el SVG sea responsivo dentro de su contenedor */
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="plano-container">
        <svg viewBox="0 0 2970 2100" xmlns="http://www.w3.org/2000/svg">
          <style>
            .bg { fill: #ffffff; }
            .room { fill: #ffffff; }
            .wall-ext { fill: none; stroke: #000000; stroke-width: 8; stroke-linecap: square; stroke-linejoin: miter; }
            .wall-int { fill: none; stroke: #000000; stroke-width: 4; stroke-linecap: square; }
            .window { fill: #e0f7fa; stroke: #000000; stroke-width: 2; }
            .door-swing { fill: rgba(0, 188, 212, 0.15); stroke: #00bcd4; stroke-width: 2; }
            .dim-line { fill: none; stroke: #cc0000; stroke-width: 2; }
            .dim-text { fill: #cc0000; font-family: sans-serif; font-size: 16px; text-anchor: middle; }
            .room-text { fill: #333333; font-family: sans-serif; font-size: 22px; font-weight: bold; text-anchor: middle; letter-spacing: 2px; }
            .room-subtext { fill: #666666; font-family: sans-serif; font-size: 14px; text-anchor: middle; }
            .title-block { fill: #ffffff; stroke: #000000; stroke-width: 4; }
            .title-text-main { fill: #000000; font-family: sans-serif; font-size: 36px; font-weight: bold; text-anchor: middle; letter-spacing: 4px; }
            .title-text-sub { fill: #333333; font-family: sans-serif; font-size: 20px; text-anchor: middle; letter-spacing: 2px; }
          </style>
        
          <rect width="100%" height="100%" class="bg" />
        
          <g transform="translate(735, 675)">
        
            <g id="geometria" transform="translate(1500, 0) rotate(90)">
              
              <rect x="0" y="0" width="750" height="1500" class="room" />
          
              <g id="lineas-cotas">
                <line x1="0" y1="-80" x2="750" y2="-80" class="dim-line" />
                <line x1="0" y1="-95" x2="0" y2="-65" class="dim-line" />
                <line x1="750" y1="-95" x2="750" y2="-65" class="dim-line" />
                
                <line x1="830" y1="0" x2="830" y2="1500" class="dim-line" />
                <line x1="815" y1="0" x2="845" y2="0" class="dim-line" />
                <line x1="815" y1="1500" x2="845" y2="1500" class="dim-line" />
                
                <line x1="-80" y1="300" x2="-80" y2="800" class="dim-line" />
                <line x1="-95" y1="300" x2="-65" y2="300" class="dim-line" />
                <line x1="-95" y1="800" x2="-65" y2="800" class="dim-line" />
                
                <line x1="0" y1="320" x2="340" y2="320" class="dim-line" />
                <line x1="340" y1="320" x2="600" y2="320" class="dim-line" />
              </g>
          
              <g id="puertas-ventanas">
                <rect x="50" y="-5" width="200" height="10" class="window" />
                <rect x="420" y="-5" width="120" height="10" class="window" />
                <rect x="50" y="1095" width="200" height="10" class="window" />
                <rect x="510" y="1095" width="200" height="10" class="window" />
          
                <path d="M 340 0 L 340 90 A 90 90 0 0 1 430 0 Z" class="door-swing" />
                <path d="M 340 210 L 250 210 A 90 90 0 0 0 340 300 Z" class="door-swing" />
                <path d="M 340 380 L 250 380 A 90 90 0 0 0 340 470 Z" class="door-swing" />
                <path d="M 340 380 L 430 380 A 90 90 0 0 1 340 470 Z" class="door-swing" />
                <path d="M 600 230 L 670 230 A 70 70 0 0 1 600 300 Z" class="door-swing" />
                <path d="M 250 1100 L 250 1010 A 90 90 0 0 1 340 1100 Z" class="door-swing" />
                <path d="M 550 1100 L 550 1010 A 90 90 0 0 0 460 1100 Z" class="door-swing" />
              </g>
          
              <g id="muros-interiores">
                <line x1="0" y1="300" x2="750" y2="300" class="wall-int" />
                <line x1="600" y1="150" x2="750" y2="150" class="wall-int" />
                <line x1="600" y1="550" x2="750" y2="550" class="wall-int" />
                <line x1="0" y1="800" x2="750" y2="800" class="wall-int" />
                <line x1="340" y1="1000" x2="460" y2="1000" class="wall-int" />
                <line x1="0" y1="1100" x2="750" y2="1100" class="wall-int" />
                <line x1="340" y1="0" x2="340" y2="1100" class="wall-int" />
                <line x1="600" y1="0" x2="600" y2="800" class="wall-int" />
                <line x1="460" y1="800" x2="460" y2="1100" class="wall-int" />
              </g>
          
              <rect x="0" y="0" width="750" height="1500" class="wall-ext" />
              
            </g>

            <g id="textos-cotas">
              <text x="950" y="-95" class="dim-text">5.00 m</text>
              <text x="1605" y="375" transform="rotate(-90 1605 375)" class="dim-text">7.50 m</text>
              <text x="750" y="865" class="dim-text">15.00 m</text>
              <text x="1170" y="170" transform="rotate(-90 1170 170)" class="dim-text">3.46 m</text>
              <text x="1170" y="470" transform="rotate(-90 1170 470)" class="dim-text">2.60 m</text>
            </g>

            <g id="textos-habitaciones">
              <text x="1350" y="170" class="room-text">DORMITORIO</text>
              <text x="1350" y="470" class="room-text">SALA</text>
              <text x="1560" y="465" class="room-subtext">INGRESO ←</text>
              
              <text x="1415" y="675" class="room-text" style="font-size: 16px;">DEPÓSITO</text>
              <text x="1265" y="675" class="room-text" style="font-size: 16px;">BAÑO</text>
              
              <text x="950" y="170" class="room-text">COCINA</text>
              
              <text x="945" y="460" class="room-text">DORMITORIO</text>
              <text x="945" y="490" class="room-text">PRINCIPAL</text>
              
              <text x="1065" y="675" class="room-text" style="font-size: 16px;">LAVANDERÍA</text>
              <text x="815" y="675" class="room-text" style="font-size: 16px;">PASILLO</text>
              
              <text x="540" y="170" class="room-text">DORMITORIO 2</text>
              <text x="590" y="410" class="room-text" style="font-size: 16px;">BAÑO 2</text>
              <text x="540" y="615" class="room-text">DORMITORIO 3</text>
              
              <text x="190" y="385" class="room-text">JARDÍN</text>
            </g>
        
          </g>
        
          <g id="cajetin" transform="translate(100, 1920)">
            <rect x="0" y="0" width="2770" height="120" class="title-block" />
            <text x="1385" y="55" class="title-text-main">PLANO DE DISTRIBUCIÓN ARQUITECTÓNICA</text>
            <text x="1385" y="95" class="title-text-sub">PLANTA GENERAL • ESCALA 1:100 • FORMATO A4</text>
          </g>
        
        </svg>
        </div>

</body>
</html>
