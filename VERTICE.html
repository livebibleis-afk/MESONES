<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano - Cotas y Muros Modificados</title>
    <style>
        /* ==========================================
           VARIABLES DE TEMA (CLARO POR DEFECTO)
           ========================================== */
        :root {
            --bg-body: #e0e0e0;
            --bg-svg: #ffffff;
            --line-color: #000000;
            --text-main: #000000;
            --text-sub: #333333;
            --accent-color: #cc0000;
            --panel-bg: #ffffff;
            --panel-border: #cccccc;
        }

        /* VARIABLES MODO OSCURO */
        body.dark-mode {
            --bg-body: #121212;
            --bg-svg: #1e1e1e;
            --line-color: #ffffff;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent-color: #ff5252;
            --panel-bg: #2d2d2d;
            --panel-border: #444444;
        }

        /* ==========================================
           ESTILOS GENERALES
           ========================================== */
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-body);
            font-family: sans-serif;
            transition: background-color 0.3s ease;
        }

        .plano-container {
            width: 100%;
            max-width: 1485px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background-color: var(--bg-svg);
            transition: background-color 0.3s ease;
            margin-top: 60px;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ==========================================
           ESTILOS DE INTERFAZ DE USUARIO (UI)
           ========================================== */
        .ui-panel {
            position: fixed;
            top: 20px;
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
            color: var(--text-main);
            display: flex;
            gap: 10px;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        button {
            cursor: pointer;
            padding: 8px 12px;
            border: 1px solid var(--panel-border);
            border-radius: 5px;
            background-color: transparent;
            color: var(--text-main);
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button:hover {
            background-color: var(--line-color);
            color: var(--bg-svg);
        }

        /* Panel Superior Izquierdo */
        #top-left-panel { left: 20px; }

        /* Panel Superior Derecho */
        #top-right-panel { right: 20px; flex-direction: column; align-items: flex-end; }
        
        #layer-menu {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            text-align: left;
            width: 100%;
        }

        #layer-menu.active {
            display: flex;
        }

        #layer-menu label {
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ==========================================
           ESTILOS PARA IMPRESIÓN
           ========================================== */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            .ui-panel {
                display: none !important;
            }
            .plano-container {
                box-shadow: none;
                margin: 0;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="top-left-panel" class="ui-panel">
        <button onclick="window.print()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
            Juan - Impresión
        </button>
        <button id="theme-toggle" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> Modo Oscuro
        </button>
    </div>

    <div id="top-right-panel" class="ui-panel">
        <button onclick="toggleLayers()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 12 12 17 22 12"></polyline><polyline points="2 17 12 22 22 17"></polyline></svg>
            Capas
        </button>
        <div id="layer-menu">
            <label><input type="checkbox" checked onchange="toggleLayer('layer-perimeter', this)"> Perímetro Exterior</label>
            <label><input type="checkbox" checked onchange="toggleLayer('layer-interior', this)"> Muros Interiores</label>
            <label><input type="checkbox" checked onchange="toggleLayer('layer-labels', this)"> Letras Completo (A-P, a-d)</label>
            <label><input type="checkbox" checked onchange="toggleLayer('layer-cotas', this)"> Cotas / Dimensiones</label>
            <label><input type="checkbox" checked onchange="toggleLayer('layer-titleblock', this)"> Cajetín de Título</label>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                themeIcon.textContent = '☀️';
                document.getElementById('theme-toggle').innerHTML = '<span id="theme-icon">☀️</span> Modo Claro';
            } else {
                themeIcon.textContent = '🌙';
                document.getElementById('theme-toggle').innerHTML = '<span id="theme-icon">🌙</span> Modo Oscuro';
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key.toLowerCase() === 'j') {
                window.print();
            }
        });

        function toggleLayers() {
            const menu = document.getElementById('layer-menu');
            menu.classList.toggle('active');
        }

        function toggleLayer(layerId, checkbox) {
            const layer = document.getElementById(layerId);
            if (checkbox.checked) {
                layer.style.display = 'block';
            } else {
                layer.style.display = 'none';
            }
        }
    </script>

</html>
