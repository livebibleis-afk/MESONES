<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador y Buscador de Materiales</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #1abc9c;
            --bg-color: #f4f6f7;
            --card-bg: #ffffff;
            --text-color: #34495e;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: block;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
            text-align: center;
        }

        /* Sección de Controles Superiores */
        .tools-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .search-box, .add-box {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent-color);
        }

        .inline-form {
            display: table;
            width: 100%;
        }

        .form-group {
            display: table-cell;
            padding-right: 10px;
            vertical-align: bottom;
        }

        .form-group:last-child {
            padding-right: 0;
            width: 120px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 11px 15px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #16a085;
        }

        /* Lista de Materiales */
        .category-title {
            font-size: 18px;
            color: var(--primary-color);
            margin: 20px 0 10px 0;
            padding-left: 8px;
            border-left: 4px solid var(--primary-color);
        }

        .material-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .material-table th, .material-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .material-table th {
            background-color: #f1f5f9;
            font-weight: 600;
        }

        .col-name { width: 55%; }
        .col-unit { width: 15%; }
        .col-qty { width: 20%; }
        .col-action { width: 10%; text-align: center; }

        /* Controles de Cantidad */
        .qty-controls {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            background: #fff;
        }

        .qty-btn {
            background: #edf2f7;
            border: none;
            width: 32px;
            height: 32px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: var(--primary-color);
            transition: background 0.2s;
        }

        .qty-btn:hover {
            background: #e2e8f0;
        }

        /* Evitar que se haga doble tap para hacer zoom en móviles en los botones */
        .qty-btn, .btn-copy {
            touch-action: manipulation;
        }

        .qty-input {
            width: 45px;
            height: 32px;
            text-align: center;
            border: none;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            font-size: 14px;
            outline: none;
        }

        /* Botón de Copiar */
        .btn-copy {
            background-color: #34495e;
            padding: 7px;
            font-size: 14px;
            border-radius: 4px;
        }

        .btn-copy:hover {
            background-color: #2c3e50;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 12px 25px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: none;
            font-weight: 600;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Generador Dinámico de Materiales</h1>

    <div class="tools-section">
        <div class="search-box">
            <label for="searchBar">🔍 Buscar Material (Escribe el nombre o iniciales como 'TPVC'):</label>
            <input type="text" id="searchBar" placeholder="Ej: 'C' para cemento, 'TPVC' para Tuberías de PVC..." oninput="filterMaterials()">
        </div>

        <div class="add-box">
            <label>➕ Añadir Material Personalizado a la Lista:</label>
            <div class="inline-form">
                <div class="form-group" style="width: 50%;">
                    <input type="text" id="newName" placeholder="Nombre del nuevo material...">
                </div>
                <div class="form-group" style="width: 25%;">
                    <select id="newUnit">
                        <option value="UND">UND</option>
                        <option value="und">und</option>
                        <option value="BLS">BLS</option>
                        <option value="M3">M3</option>
                        <option value="KG">KG</option>
                    </select>
                </div>
                <div class="form-group">
                    <button type="button" onclick="addNewMaterial()">Añadir</button>
                </div>
            </div>
        </div>
    </div>

    <div id="materialsContainer"></div>
</div>

<div id="toast" class="toast">¡Copiado al portapapeles!</div>

<script>
    // Banco de datos inicial extraído de tu presupuesto (con cantidades inicializadas en 0)
    let materialsData = [
        // ELECTRICIDAD
        { name: 'Optagonales para bracquet', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Tuberías de 3/4" PVC', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Cajas rectangulares para interruptores', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Cajas de pase con tapa plana 20 x 20', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Cajas de pase con tapa plana 30 x 30', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Pegamento azul de 1/4', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Hoja de sierra', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Curvas de 3/4"', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Tablero de distribución', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Tablero de control de bomba', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Tubería de 1" de PVC', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Curvas de 1" de PVC', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },

        // TARRAJEO Y CONTRAPISO
        { name: 'Cemento', unit: 'BLS', qty: 0, category: 'Tarrajeo y Contra Piso' },
        { name: 'Arena fina', unit: 'M3', qty: 0, category: 'Tarrajeo y Contra Piso' },
        { name: 'Impermeabilizante para interior de cisterna Sikatop', unit: 'KG', qty: 0, category: 'Tarrajeo y Contra Piso' },
        { name: 'Arena gruesa', unit: 'M3', qty: 0, category: 'Tarrajeo y Contra Piso' },

        // AGUA FRÍA Y DESAGÜE
        { name: 'Tubos 1" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Kits de accesorios para cisterna', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tubos 3/4" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tubos 1/2" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Reducciones de 3/4" a 1/2"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Codos de 1" PVC x 90°', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Codos de 3/4" PVC x 90°', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Codos de 1/2" PVC x 90°', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Juego de llave de paso 3/4" PVC colombianas', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Niples de 3/4" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Niples de 1/2" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Codos de 1/2" bronce x 90°', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Uniones de 3/4" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Uniones de 1/2" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'T 1/2" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'T de 3/4" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tapones hembra de 1/2"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tapones macho de 1/2" de rosca', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tapones hembra de 3/4"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tapones macho de 3/4" de rosca', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Teflón amarillo', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Pegamento azul grande', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Formador de empaque (Adex)', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Registro mixto de 2"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Registro mixto de 4"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Válvula check de 3/4"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Adaptadores de 3/4"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Adaptadores de 1/2"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },

        // AGUA CALIENTE
        { name: 'Tubos 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Codos de 1/2" CPVC x 90°', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'T de 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Codos de bronce de 1/2"', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'T de bronce de 1/2"', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Uniones de 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Juego de llave de paso 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Mezcladoras', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Adaptadores de 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Niples de 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Válvulas de control', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Pegamento de tubería CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' }
    ];

    // Renderiza la interfaz inicial
    renderInterface(materialsData);

    function renderInterface(data) {
        const container = document.getElementById('materialsContainer');
        container.innerHTML = '';

        // Agrupar elementos por categorías
        const categories = {};
        data.forEach((item, index) => {
            if (!categories[item.category]) {
                categories[item.category] = [];
            }
            categories[item.category].push({ ...item, originalIndex: index });
        });

        for (const catName in categories) {
            if (categories[catName].length === 0) continue;

            const catTitle = document.createElement('div');
            catTitle.className = 'category-title';
            catTitle.innerText = catName;
            container.appendChild(catTitle);

            const table = document.createElement('table');
            table.className = 'material-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th class="col-name">Descripción</th>
                        <th class="col-unit">Unidad</th>
                        <th class="col-qty">Cantidad</th>
                        <th class="col-action">Copiar</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;

            const tbody = table.querySelector('tbody');

            categories[catName].forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.name}</strong></td>
                    <td>${item.unit}</td>
                    <td>
                        <div class="qty-controls">
                            <button type="button" class="qty-btn" onclick="changeQty(${item.originalIndex}, -1)">-</button>
                            <input type="number" id="qty-${item.originalIndex}" class="qty-input" value="${item.qty}" min="0" onchange="updateQtyDirectly(${item.originalIndex}, this.value)">
                            <button type="button" class="qty-btn" onclick="changeQty(${item.originalIndex}, 1)">+</button>
                        </div>
                    </td>
                    <td class="col-action">
                        <button type="button" class="btn-copy" onclick="copyRow(${item.originalIndex})" title="Copiar este material">📋</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            container.appendChild(table);
        }
    }

    // NUEVA FUNCIÓN: Ahora solo actualiza el valor visual del input específico, no redibuja la tabla
    function changeQty(index, amount) {
        materialsData[index].qty = Math.max(0, materialsData[index].qty + amount);
        const inputElement = document.getElementById('qty-' + index);
        if (inputElement) {
            inputElement.value = materialsData[index].qty;
        }
    }

    // NUEVA FUNCIÓN: Mismo comportamiento, solo afecta al input modificado
    function updateQtyDirectly(index, value) {
        let val = parseInt(value);
        materialsData[index].qty = isNaN(val) || val < 0 ? 0 : val;
        const inputElement = document.getElementById('qty-' + index);
        if (inputElement) {
            inputElement.value = materialsData[index].qty;
        }
    }

    function filterMaterials() {
        const query = document.getElementById('searchBar').value.toLowerCase().trim();
        
        if (query === '') {
            renderInterface(materialsData);
            return;
        }

        const filtered = materialsData.filter(item => {
            const fullName = item.name.toLowerCase();
            if (fullName.includes(query)) return true;

            const words = fullName.replace(/[^a-zA-Z0-9\s]/g, '').split(/\s+/);
            const initials = words.map(w => w[0]).join('');
            
            if (initials.includes(query)) return true;

            return false;
        });

        renderInterface(filtered);
    }

    function addNewMaterial() {
        const nameInput = document.getElementById('newName');
        const unitSelect = document.getElementById('newUnit');

        const name = nameInput.value.trim();
        const unit = unitSelect.value;

        if (name === '') {
            alert('Por favor, escribe el nombre del material.');
            return;
        }

        materialsData.unshift({
            name: name,
            unit: unit,
            qty: 0,
            category: 'Materiales Agregados Recientemente'
        });

        nameInput.value = '';
        document.getElementById('searchBar').value = ''; 
        renderInterface(materialsData);
        showToast('Material añadido con éxito');
    }

    // NUEVA FUNCIÓN: Lee el valor directamente de la base de datos para asegurar copiar la cantidad correcta actualizada
    function copyRow(index) {
        const item = materialsData[index];
        const textToCopy = `${item.name} - ${item.qty} ${item.unit}`;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            showToast(`Copiado: ${textToCopy}`);
        }).catch(err => {
            console.error('Error al copiar texto: ', err);
        });
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2500);
    }
</script>

</body>
</html>
