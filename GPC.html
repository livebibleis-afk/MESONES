<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador y Buscador de Materiales</title>
    <style>
        :root {
            /* Variables Modo Claro */
            --primary-color: #2c3e50;
            --accent-color: #1abc9c;
            --bg-color: #f4f6f7;
            --card-bg: #ffffff;
            --text-color: #34495e;
            --border-color: #e2e8f0;
            --th-bg: #f1f5f9;
            --btn-hover: #16a085;
        }

        body.dark-mode {
            /* Variables Modo Oscuro */
            --primary-color: #63b3ed;
            --accent-color: #38b2ac;
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --text-color: #e2e8f0;
            --border-color: #4a5568;
            --th-bg: #4a5568;
            --btn-hover: #319795;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: block;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: background-color 0.3s;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 22px;
        }

        .btn-theme {
            background-color: var(--text-color);
            color: var(--card-bg);
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Sección de Controles Superiores */
        .tools-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .search-box, .add-box { margin-bottom: 15px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            background: var(--card-bg);
            color: var(--text-color);
            transition: border 0.2s;
            -webkit-appearance: none; /* Mejora visual en iOS */
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent-color);
        }

        .inline-form { display: flex; gap: 10px; }
        .form-group { flex: 1; }
        .form-btn { width: 100px; }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 11px 15px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--btn-hover); }

        /* Lista de Materiales */
        .category-title {
            font-size: 18px;
            color: var(--primary-color);
            margin: 20px 0 10px 0;
            padding-left: 8px;
            border-left: 4px solid var(--primary-color);
        }

        .material-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .material-table th, .material-table td {
            padding: 10px 5px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .material-table th { background-color: var(--th-bg); font-weight: 600; }

        /* Controles de Cantidad */
        .qty-controls {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            background: var(--card-bg);
        }

        .qty-btn {
            background: var(--th-bg);
            color: var(--text-color);
            border: none;
            width: 32px;
            height: 32px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
        }

        .qty-input {
            width: 40px;
            height: 32px;
            text-align: center;
            border: none;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            font-size: 14px;
            outline: none;
            border-radius: 0;
            padding: 0;
        }

        .btn-copy {
            background-color: #4a5568;
            padding: 6px;
            font-size: 14px;
        }

        /* Sección de Resumen (Pedido) */
        #summaryContainer {
            margin-top: 30px;
            padding: 20px;
            background: var(--th-bg);
            border-radius: 8px;
            border: 2px solid var(--accent-color);
            display: none; 
        }

        #summaryContainer h2 {
            color: var(--primary-color);
            margin-bottom: 15px;
            font-size: 18px;
        }

        #summaryList {
            list-style-type: none;
            margin-bottom: 20px;
        }

        #summaryList li {
            padding: 8px 0;
            border-bottom: 1px dashed var(--border-color);
            font-size: 15px;
        }

        .summary-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-pdf { background-color: #e53e3e; }
        .btn-pdf:hover { background-color: #c53030; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 12px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: none;
            font-weight: 600;
            z-index: 1000;
            text-align: center;
            width: max-content;
        }

        /* Modo Impresión / PDF */
        @media print {
            body { background: white; color: black; padding: 0; margin: 0; }
            .tools-section, .material-table, .category-title, .header-actions button, .summary-actions {
                display: none !important;
            }
            #summaryContainer {
                display: block !important;
                border: none;
                background: none;
                margin-top: 0;
            }
            #summaryContainer h2 { color: black; }
            #summaryList li { border-bottom: 1px solid #ccc; color: black; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <h1>Generador de Materiales</h1>
        <button class="btn-theme" onclick="toggleTheme()">🌙 Oscuro</button>
    </div>

    <div class="tools-section">
        <div class="search-box">
            <label for="searchBar">🔍 Buscar Material (Ej: 'C' o 'TPVC'):</label>
            <input type="text" id="searchBar" placeholder="Escribe aquí para filtrar..." oninput="filterMaterials()">
        </div>

        <div class="add-box">
            <label>➕ Añadir Material Personalizado:</label>
            <div class="inline-form">
                <div class="form-group">
                    <input type="text" id="newName" placeholder="Nombre...">
                </div>
                <div class="form-group" style="flex: 0.4;">
                    <select id="newUnit">
                        <option value="UND">UND</option>
                        <option value="und">und</option>
                        <option value="BLS">BLS</option>
                        <option value="M3">M3</option>
                        <option value="KG">KG</option>
                    </select>
                </div>
                <div class="form-btn">
                    <button type="button" onclick="addNewMaterial()">Añadir</button>
                </div>
            </div>
        </div>
    </div>

    <div id="materialsContainer"></div>

    <div id="summaryContainer">
        <h2>📋 Lista de Pedido Generada</h2>
        <ul id="summaryList"></ul>
        <div class="summary-actions">
            <button id="copyListBtn" type="button" style="flex:1;">📑 Copiar Lista</button>
            <button class="btn-pdf" type="button" onclick="generatePDF()" style="flex:1;">📄 Guardar PDF</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">¡Copiado!</div>

<script>
    // Configuración Modo Oscuro
    function toggleTheme() {
        const body = document.body;
        const btn = document.querySelector('.btn-theme');
        body.classList.toggle('dark-mode');
        
        if (body.classList.contains('dark-mode')) {
            btn.innerText = '☀️ Claro';
        } else {
            btn.innerText = '🌙 Oscuro';
        }
    }

    let materialsData = [
        // ELECTRICIDAD
        { name: 'Optagonales para bracquet', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Tuberías de 3/4" PVC', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Cajas rectangulares para interruptores', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Cajas de pase con tapa plana 20 x 20', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Cajas de pase con tapa plana 30 x 30', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Pegamento azul de 1/4', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Hoja de sierra', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Curvas de 3/4"', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Tablero de distribución', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Tablero de control de bomba', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Tubería de 1" de PVC', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },
        { name: 'Curvas de 1" de PVC', unit: 'UND', qty: 0, category: 'Materiales para Electricidad' },

        // TARRAJEO Y CONTRAPISO
        { name: 'Cemento', unit: 'BLS', qty: 0, category: 'Tarrajeo y Contra Piso' },
        { name: 'Arena fina', unit: 'M3', qty: 0, category: 'Tarrajeo y Contra Piso' },
        { name: 'Impermeabilizante para interior de cisterna Sikatop', unit: 'KG', qty: 0, category: 'Tarrajeo y Contra Piso' },
        { name: 'Arena gruesa', unit: 'M3', qty: 0, category: 'Tarrajeo y Contra Piso' },

        // AGUA FRÍA Y DESAGÜE
        { name: 'Tubos 1" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Kits de accesorios para cisterna', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tubos 3/4" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tubos 1/2" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Reducciones de 3/4" a 1/2"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Codos de 1" PVC x 90°', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Codos de 3/4" PVC x 90°', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Codos de 1/2" PVC x 90°', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Juego de llave de paso 3/4" PVC colombianas', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Niples de 3/4" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Niples de 1/2" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Codos de 1/2" bronce x 90°', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Uniones de 3/4" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Uniones de 1/2" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'T 1/2" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'T de 3/4" PVC', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tapones hembra de 1/2"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tapones macho de 1/2" de rosca', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tapones hembra de 3/4"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Tapones macho de 3/4" de rosca', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Teflón amarillo', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Pegamento azul grande', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Formador de empaque (Adex)', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Registro mixto de 2"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Registro mixto de 4"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Válvula check de 3/4"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Adaptadores de 3/4"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },
        { name: 'Adaptadores de 1/2"', unit: 'und', qty: 0, category: 'Agua Fría y Desagüe' },

        // AGUA CALIENTE
        { name: 'Tubos 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Codos de 1/2" CPVC x 90°', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'T de 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Codos de bronce de 1/2"', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'T de bronce de 1/2"', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Uniones de 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Juego de llave de paso 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Mezcladoras', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Adaptadores de 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Niples de 1/2" CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Válvulas de control', unit: 'und', qty: 0, category: 'Agua Caliente' },
        { name: 'Pegamento de tubería CPVC', unit: 'und', qty: 0, category: 'Agua Caliente' }
    ];

    // ASIGNAR ID ÚNICO PARA QUE NO SE PIERDA AL FILTRAR
    materialsData.forEach((item, index) => {
        item.id = index;
    });

    renderInterface(materialsData);

    function renderInterface(data) {
        const container = document.getElementById('materialsContainer');
        container.innerHTML = '';

        const categories = {};
        data.forEach((item) => {
            if (!categories[item.category]) categories[item.category] = [];
            categories[item.category].push(item);
        });

        for (const catName in categories) {
            if (categories[catName].length === 0) continue;

            const catTitle = document.createElement('div');
            catTitle.className = 'category-title';
            catTitle.innerText = catName;
            container.appendChild(catTitle);

            const table = document.createElement('table');
            table.className = 'material-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th class="col-name">Descripción</th>
                        <th class="col-unit">Und</th>
                        <th class="col-qty">Cant</th>
                        <th class="col-action">Copiar</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;

            const tbody = table.querySelector('tbody');
            categories[catName].forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.name}</strong></td>
                    <td>${item.unit}</td>
                    <td>
                        <div class="qty-controls">
                            <button type="button" class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
                            <input type="number" id="qty-${item.id}" class="qty-input" value="${item.qty}" min="0" onchange="updateQtyDirectly(${item.id}, this.value)">
                            <button type="button" class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                        </div>
                    </td>
                    <td class="col-action">
                        <button type="button" class="btn-copy" onclick="copyRow(${item.id})" title="Copiar individual">📋</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            container.appendChild(table);
        }
        updateSummary();
    }

    function changeQty(id, amount) {
        // Encontrar el item original en materialsData usando su ID
        const item = materialsData.find(m => m.id === id);
        if (item) {
            item.qty = Math.max(0, item.qty + amount);
            const inputElement = document.getElementById('qty-' + id);
            if (inputElement) inputElement.value = item.qty;
            updateSummary();
        }
    }

    function updateQtyDirectly(id, value) {
        const item = materialsData.find(m => m.id === id);
        if (item) {
            let val = parseInt(value);
            item.qty = isNaN(val) || val < 0 ? 0 : val;
            const inputElement = document.getElementById('qty-' + id);
            if (inputElement) inputElement.value = item.qty;
            updateSummary();
        }
    }

    function updateSummary() {
        const summaryContainer = document.getElementById('summaryContainer');
        const summaryList = document.getElementById('summaryList');
        const copyBtn = document.getElementById('copyListBtn');
        
        summaryList.innerHTML = '';
        let hasItems = false;
        let textForCopy = "*Lista de Materiales - Pedido:*\n\n";

        materialsData.forEach(item => {
            if (item.qty > 0) {
                hasItems = true;
                const li = document.createElement('li');
                li.innerText = `${item.qty} ${item.unit} - ${item.name}`;
                summaryList.appendChild(li);
                textForCopy += `• ${item.qty} ${item.unit} - ${item.name}\n`;
            }
        });

        if (hasItems) {
            summaryContainer.style.display = 'block';
            copyBtn.onclick = () => copyToClipboardRobust(textForCopy, '¡Lista completa copiada!');
        } else {
            summaryContainer.style.display = 'none';
        }
    }

    // RETARDO AÑADIDO PARA ASEGURAR QUE IOS SAFARI LEA EL COMANDO DE IMPRESIÓN/PDF
    function generatePDF() {
        setTimeout(function() {
            window.print();
        }, 300);
    }

    // MÉTODO DE COPIADO ROBUSTO (ENGAÑA A IOS SAFARI PARA QUE PERMITA COPIAR)
    function copyToClipboardRobust(text, successMessage) {
        // Fallback para Safari y navegadores restrictivos
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(successMessage);
            }).catch(err => {
                fallbackCopy(text, successMessage);
            });
        } else {
            fallbackCopy(text, successMessage);
        }
    }

    function fallbackCopy(text, successMessage) {
        let textArea = document.createElement("textarea");
        textArea.value = text;
        // Evita hacer scroll
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            let successful = document.execCommand('copy');
            if (successful) showToast(successMessage);
        } catch (err) {
            console.error('Error al copiar', err);
            alert("Tu navegador bloqueó la copia automática. Intenta copiarlo manualmente.");
        }
        document.body.removeChild(textArea);
    }

    function filterMaterials() {
        const query = document.getElementById('searchBar').value.toLowerCase().trim();
        if (query === '') {
            renderInterface(materialsData);
            return;
        }
        const filtered = materialsData.filter(item => {
            const fullName = item.name.toLowerCase();
            if (fullName.includes(query)) return true;
            const words = fullName.replace(/[^a-zA-Z0-9\s]/g, '').split(/\s+/);
            const initials = words.map(w => w[0]).join('');
            if (initials.includes(query)) return true;
            return false;
        });
        renderInterface(filtered);
    }

    function addNewMaterial() {
        const nameInput = document.getElementById('newName');
        const unitSelect = document.getElementById('newUnit');
        const name = nameInput.value.trim();
        const unit = unitSelect.value;

        if (name === '') {
            alert('Por favor, escribe el nombre del material.');
            return;
        }

        // Obtener el ID más alto actual y sumar 1
        const maxId = Math.max(...materialsData.map(m => m.id));
        
        materialsData.unshift({
            id: maxId + 1,
            name: name,
            unit: unit,
            qty: 0,
            category: 'Materiales Agregados Recientemente'
        });

        nameInput.value = '';
        document.getElementById('searchBar').value = ''; 
        renderInterface(materialsData);
        showToast('Material añadido con éxito');
    }

    function copyRow(id) {
        const item = materialsData.find(m => m.id === id);
        if (item) {
            const textToCopy = `${item.qty} ${item.unit} - ${item.name}`;
            copyToClipboardRobust(textToCopy, '¡Material copiado!');
        }
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }
</script>

</body>
</html>
